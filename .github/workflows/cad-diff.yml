name: CAD Visual Diff

on:
  pull_request:
    paths:
      - '**.step'
      - '**.stp'
      - '**.stl'
      - '**.cyclecad'
      - '**.iam'
      - '**.ipt'
      - '**.json'

permissions:
  pull-requests: write
  contents: read

jobs:
  cad-diff:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y chromium-browser

      - name: Install npm dependencies
        run: |
          npm install --save-dev \
            three \
            puppeteer \
            occt-import-js \
            canvas \
            @actions/github \
            @actions/core

      - name: Create scripts directory
        run: mkdir -p .github/scripts

      - name: Copy CAD diff script
        run: |
          if [ ! -f .github/scripts/cad-diff.js ]; then
            echo "Note: cad-diff.js will be generated"
          fi

      - name: Generate CAD diffs
        id: generate-diffs
        run: node .github/scripts/cad-diff.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}

      - name: Post PR comment
        if: steps.generate-diffs.outputs.comment_body
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const commentBody = process.env.COMMENT_BODY;

            if (!commentBody || commentBody.trim() === '') {
              console.log('No CAD changes detected');
              return;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('🔧 CAD Visual Diff')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody,
              });
              console.log('Updated existing comment');
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody,
              });
              console.log('Created new comment');
            }
        env:
          COMMENT_BODY: ${{ steps.generate-diffs.outputs.comment_body }}

      - name: Upload diff artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: cad-diffs
          path: .github/diffs/
          retention-days: 7
