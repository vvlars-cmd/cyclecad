<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pentacad — full test suite</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #F5F7F8;
    --surface: #fff;
    --border: #E3E7EA;
    --text: #1F2529;
    --text-2: #5C6770;
    --text-3: #8A949D;
    --green: #15B573;
    --green-dark: #0E8F5A;
    --amber: #F5A623;
    --red: #E04444;
    --blue: #2E90E8;
  }
  * { margin:0; padding:0; box-sizing: border-box; }
  body {
    font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    padding: 24px;
  }
  .container { max-width: 1100px; margin: 0 auto; }
  h1 { font-weight: 800; letter-spacing: -0.02em; margin-bottom: 4px; font-size: 28px; }
  .subtitle { color: var(--text-2); margin-bottom: 20px; }
  .controls { display: flex; gap: 8px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
  .btn {
    padding: 10px 18px;
    border-radius: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    font-size: 14px;
  }
  .btn.primary { background: var(--green); color: #fff; border-color: var(--green-dark); }
  .btn.primary:hover { background: var(--green-dark); }
  .btn:hover { background: var(--bg); }
  .summary {
    margin-bottom: 20px;
    padding: 14px 18px;
    border-radius: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    gap: 24px;
    font-size: 13px;
    align-items: center;
  }
  .summary .label { color: var(--text-2); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; }
  .summary .val { font-size: 20px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
  .summary .val.pass { color: var(--green-dark); }
  .summary .val.fail { color: var(--red); }
  .module {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .module header {
    padding: 12px 18px;
    background: #FAFBFC;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
  }
  .module header h2 {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .module header .count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-2);
  }
  .module header .count.pass { color: var(--green-dark); }
  .module header .count.fail { color: var(--red); }
  .tests {
    padding: 0;
  }
  .test {
    padding: 8px 18px;
    border-bottom: 1px solid #F0F3F5;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    display: grid;
    grid-template-columns: 20px 1fr auto;
    gap: 10px;
    align-items: baseline;
  }
  .test:last-child { border-bottom: 0; }
  .test .icon { font-size: 14px; }
  .test.pass .icon { color: var(--green); }
  .test.fail .icon { color: var(--red); }
  .test.pending .icon { color: var(--text-3); }
  .test .detail {
    font-size: 11px;
    color: var(--text-3);
  }
  .test.fail .detail {
    color: var(--red);
  }
  .footer {
    margin-top: 30px;
    padding: 16px;
    font-size: 12px;
    color: var(--text-3);
    text-align: center;
  }
  code {
    background: #F0F3F5;
    padding: 1px 4px;
    border-radius: 3px;
    font-size: 11px;
  }
</style>
</head>
<body>

<!-- Load all modules under test -->
<script src="../js/modules/pentacad-sim.js"></script>
<script src="../js/modules/pentacad-cam.js"></script>
<script src="../js/modules/pentacad-bridge.js"></script>
<script src="../js/modules/rockhopper-client.js"></script>
<script src="../js/modules/pentacad.js"></script>

<div class="container">
  <h1>Pentacad — full test suite</h1>
  <div class="subtitle">Runs every module's self-tests plus integration scenarios. All tests run in-browser. No server required.</div>

  <div class="controls">
    <button class="btn primary" id="run-all">▶ Run all</button>
    <button class="btn" id="export-json">📥 Export JSON</button>
    <button class="btn" id="expand-all">Expand all</button>
    <button class="btn" id="collapse-all">Collapse all</button>
  </div>

  <div class="summary">
    <div>
      <div class="label">Total</div>
      <div class="val" id="sum-total">—</div>
    </div>
    <div>
      <div class="label">Passed</div>
      <div class="val pass" id="sum-pass">—</div>
    </div>
    <div>
      <div class="label">Failed</div>
      <div class="val fail" id="sum-fail">—</div>
    </div>
    <div>
      <div class="label">Elapsed</div>
      <div class="val" id="sum-elapsed">—</div>
    </div>
  </div>

  <div id="modules"></div>

  <div class="footer">
    Pentacad v1.0.0 · <code>app/tests/pentacad-all-tests.html</code> · Test definitions inline below
  </div>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════════════════════
// TEST RUNNER
// ═══════════════════════════════════════════════════════════════════════════

const state = { modules: {}, running: false, startTime: 0 };

function assertEq(actual, expected, tol = 1e-9) {
  if (typeof actual === 'number' && typeof expected === 'number') {
    if (Number.isNaN(actual) && Number.isNaN(expected)) return { pass: true };
    if (Math.abs(actual - expected) <= tol) return { pass: true };
    return { pass: false, detail: `expected ${expected}, got ${actual}` };
  }
  if (JSON.stringify(actual) === JSON.stringify(expected)) return { pass: true };
  return { pass: false, detail: `expected ${JSON.stringify(expected)}, got ${JSON.stringify(actual)}` };
}

function assertTruthy(value, name) {
  if (value) return { pass: true };
  return { pass: false, detail: `${name} is falsy (got ${JSON.stringify(value)})` };
}

function assertArrayLen(arr, len) {
  if (!Array.isArray(arr)) return { pass: false, detail: `not an array (got ${typeof arr})` };
  if (arr.length === len) return { pass: true };
  return { pass: false, detail: `expected length ${len}, got ${arr.length}` };
}

function assertContains(arr, test, name) {
  if (!Array.isArray(arr)) return { pass: false, detail: 'not an array' };
  if (arr.some(test)) return { pass: true };
  return { pass: false, detail: `${name} not found in array of ${arr.length}` };
}

function defineModule(id, title, tests) {
  state.modules[id] = { id, title, tests, results: [] };
}

function runTest(moduleId, test) {
  try {
    const result = test.fn();
    return { name: test.name, pass: result.pass, detail: result.detail || '' };
  } catch (err) {
    return { name: test.name, pass: false, detail: `threw: ${err.message}` };
  }
}

function runAll() {
  state.running = true;
  state.startTime = performance.now();

  for (const mod of Object.values(state.modules)) {
    mod.results = [];
    for (const test of mod.tests) {
      mod.results.push(runTest(mod.id, test));
    }
  }

  render();
  state.running = false;
}

function render() {
  const modulesEl = document.getElementById('modules');
  modulesEl.innerHTML = '';

  let totalPass = 0, totalFail = 0;
  for (const mod of Object.values(state.modules)) {
    const pass = mod.results.filter(r => r.pass).length;
    const fail = mod.results.filter(r => !r.pass).length;
    totalPass += pass;
    totalFail += fail;

    const hdr = `<header data-mod="${mod.id}">
      <h2>${mod.title}</h2>
      <span class="count ${fail > 0 ? 'fail' : 'pass'}">${pass}/${mod.tests.length}${fail > 0 ? ` · ${fail} failed` : ''}</span>
    </header>`;

    const tests = mod.results.map(r => `
      <div class="test ${r.pass ? 'pass' : 'fail'}">
        <span class="icon">${r.pass ? '✓' : '✗'}</span>
        <span>${r.name}</span>
        <span class="detail">${r.detail || ''}</span>
      </div>
    `).join('');

    modulesEl.insertAdjacentHTML('beforeend', `
      <div class="module">${hdr}<div class="tests">${tests}</div></div>
    `);
  }

  document.getElementById('sum-total').textContent = totalPass + totalFail;
  document.getElementById('sum-pass').textContent = totalPass;
  document.getElementById('sum-fail').textContent = totalFail;
  document.getElementById('sum-elapsed').textContent = `${(performance.now() - state.startTime).toFixed(1)} ms`;
}

function exportJSON() {
  const out = {
    timestamp: new Date().toISOString(),
    modules: Object.values(state.modules).map(m => ({
      id: m.id,
      title: m.title,
      pass: m.results.filter(r => r.pass).length,
      fail: m.results.filter(r => !r.pass).length,
      results: m.results
    }))
  };
  const blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `pentacad-tests-${Date.now()}.json`;
  a.click();
}

// ═══════════════════════════════════════════════════════════════════════════
// TEST DEFINITIONS — pentacad-sim.js
// ═══════════════════════════════════════════════════════════════════════════

defineModule('sim', 'pentacad-sim.js · G-code simulator', [
  // Parser basics
  {
    name: 'parse: empty string returns no lines',
    fn: () => {
      const r = window.CycleCAD.PentacadSim.parseGCode('');
      return assertEq(r.lines.length, 0);
    }
  },
  {
    name: 'parse: single G0 line',
    fn: () => {
      const r = window.CycleCAD.PentacadSim.parseGCode('G0 X10 Y20');
      if (r.lines.length !== 1) return { pass: false, detail: `got ${r.lines.length} lines` };
      const words = r.lines[0].words;
      if (words.length !== 3) return { pass: false, detail: `got ${words.length} words` };
      return { pass: true };
    }
  },
  {
    name: 'parse: N-number stripped from body',
    fn: () => {
      const r = window.CycleCAD.PentacadSim.parseGCode('N100 G1 X5 F10');
      if (r.lines[0].nNumber !== 100) return { pass: false, detail: 'N-number not captured' };
      if (r.lines[0].words.length !== 3) return { pass: false, detail: `got ${r.lines[0].words.length} words (expected 3 after N strip)` };
      return { pass: true };
    }
  },
  {
    name: 'parse: paren comment captured',
    fn: () => {
      const r = window.CycleCAD.PentacadSim.parseGCode('G0 X0 (move to home) Y0');
      return assertEq(r.lines[0].comment, 'move to home');
    }
  },
  {
    name: 'parse: semicolon comment stripped',
    fn: () => {
      const r = window.CycleCAD.PentacadSim.parseGCode('G1 Z-5 ; plunge');
      if (r.lines[0].words.length !== 2) return { pass: false, detail: 'semicolon comment not stripped' };
      return { pass: true };
    }
  },
  {
    name: 'parse: block-delete flag',
    fn: () => {
      const r = window.CycleCAD.PentacadSim.parseGCode('/G0 X1');
      return assertEq(r.lines[0].blockDelete, true);
    }
  },
  {
    name: 'parse: decimal-only coordinate (.5)',
    fn: () => {
      const r = window.CycleCAD.PentacadSim.parseGCode('G1 X.5');
      if (!r.lines[0].words.length) return { pass: false, detail: 'no words parsed' };
      return assertEq(r.lines[0].words[1].value, 0.5);
    }
  },
  {
    name: 'parse: negative coordinate',
    fn: () => {
      const r = window.CycleCAD.PentacadSim.parseGCode('G0 X-5.5 Y-10');
      return assertEq(r.lines[0].words[1].value, -5.5);
    }
  },
  {
    name: 'parse: positive signed coordinate (+5)',
    fn: () => {
      const r = window.CycleCAD.PentacadSim.parseGCode('G0 X+5 Y+10');
      return assertEq(r.lines[0].words[1].value, 5);
    }
  },
  {
    name: 'parse: multiple parens',
    fn: () => {
      const r = window.CycleCAD.PentacadSim.parseGCode('(op1) G1 X5 (move) Y5');
      return assertEq(r.lines[0].comment, 'op1 | move');
    }
  },

  // Executor basics
  {
    name: 'exec: G0 emits a rapid move',
    fn: () => {
      const parsed = window.CycleCAD.PentacadSim.parseGCode('G20 G90 G0 X1 Y2');
      const exec = window.CycleCAD.PentacadSim.createExecutor();
      parsed.lines.forEach(l => exec.step(l));
      const moves = exec.getMoves ? exec.getMoves() : (exec.moves || []);
      const rapids = moves.filter(m => m.mode === 'rapid');
      return assertTruthy(rapids.length > 0, 'rapid move count');
    }
  },
  {
    name: 'exec: G1 emits a feed move',
    fn: () => {
      const parsed = window.CycleCAD.PentacadSim.parseGCode('G20 G90 G94 G1 X5 F30');
      const exec = window.CycleCAD.PentacadSim.createExecutor();
      parsed.lines.forEach(l => exec.step(l));
      const moves = exec.getMoves ? exec.getMoves() : (exec.moves || []);
      const feeds = moves.filter(m => m.mode !== 'rapid');
      return assertTruthy(feeds.length > 0, 'feed move count');
    }
  },
  {
    name: 'exec: G20 sets inch units',
    fn: () => {
      const parsed = window.CycleCAD.PentacadSim.parseGCode('G20');
      const exec = window.CycleCAD.PentacadSim.createExecutor();
      parsed.lines.forEach(l => exec.step(l));
      const state = exec.getState ? exec.getState() : {};
      return assertEq(state.units, 'inch');
    }
  },
  {
    name: 'exec: G21 sets mm units',
    fn: () => {
      const parsed = window.CycleCAD.PentacadSim.parseGCode('G21');
      const exec = window.CycleCAD.PentacadSim.createExecutor();
      parsed.lines.forEach(l => exec.step(l));
      const state = exec.getState ? exec.getState() : {};
      return assertEq(state.units, 'mm');
    }
  },
  {
    name: 'exec: M3 sets spindle on',
    fn: () => {
      const parsed = window.CycleCAD.PentacadSim.parseGCode('S15000 M3');
      const exec = window.CycleCAD.PentacadSim.createExecutor();
      parsed.lines.forEach(l => exec.step(l));
      const state = exec.getState ? exec.getState() : {};
      return assertEq(state.spindleOn, true);
    }
  },
  {
    name: 'exec: M5 sets spindle off',
    fn: () => {
      const parsed = window.CycleCAD.PentacadSim.parseGCode('S15000 M3\nM5');
      const exec = window.CycleCAD.PentacadSim.createExecutor();
      parsed.lines.forEach(l => exec.step(l));
      const state = exec.getState ? exec.getState() : {};
      return assertEq(state.spindleOn, false);
    }
  },
  {
    name: 'exec: tool change via T + M6',
    fn: () => {
      const parsed = window.CycleCAD.PentacadSim.parseGCode('T5 M6');
      const exec = window.CycleCAD.PentacadSim.createExecutor();
      parsed.lines.forEach(l => exec.step(l));
      const state = exec.getState ? exec.getState() : {};
      return assertEq(state.toolId, 5);
    }
  },
  {
    name: 'exec: WCS change G54→G55',
    fn: () => {
      const parsed = window.CycleCAD.PentacadSim.parseGCode('G54\nG55');
      const exec = window.CycleCAD.PentacadSim.createExecutor();
      parsed.lines.forEach(l => exec.step(l));
      const state = exec.getState ? exec.getState() : {};
      return assertEq(state.wcs, 'G55');
    }
  },
  {
    name: 'exec: G90 absolute mode',
    fn: () => {
      const parsed = window.CycleCAD.PentacadSim.parseGCode('G90');
      const exec = window.CycleCAD.PentacadSim.createExecutor();
      parsed.lines.forEach(l => exec.step(l));
      const state = exec.getState ? exec.getState() : {};
      return assertEq(state.modalGroups?.dist, 'G90');
    }
  },
  {
    name: 'exec: coolant M7',
    fn: () => {
      const parsed = window.CycleCAD.PentacadSim.parseGCode('M7');
      const exec = window.CycleCAD.PentacadSim.createExecutor();
      parsed.lines.forEach(l => exec.step(l));
      const state = exec.getState ? exec.getState() : {};
      return assertEq(state.coolant, 'mist');
    }
  },
  {
    name: 'exec: inch → mm unit round-trip',
    fn: () => {
      const parsed = window.CycleCAD.PentacadSim.parseGCode('G20 G90\nG0 X1 Y0 Z0');
      const exec = window.CycleCAD.PentacadSim.createExecutor();
      parsed.lines.forEach(l => exec.step(l));
      const moves = exec.getMoves ? exec.getMoves() : (exec.moves || []);
      const lastMove = moves[moves.length - 1];
      // 1 inch = 25.4 mm
      return assertEq(lastMove.to.x, 25.4, 0.0001);
    }
  },

  // Soft-limit check
  {
    name: 'limits: within-envelope program passes',
    fn: () => {
      const machine = { linear: { x:{min:-5,max:5}, y:{min:-3.5,max:3.5}, z:{min:-2.5,max:2.5} }, rotary: { a:{min:-35,max:135}, b:{min:-360,max:360,continuous:true} } };
      const parsed = window.CycleCAD.PentacadSim.parseGCode('G20 G90\nG0 X1 Y1 Z0');
      const exec = window.CycleCAD.PentacadSim.createExecutor();
      parsed.lines.forEach(l => exec.step(l));
      const moves = exec.getMoves ? exec.getMoves() : (exec.moves || []);
      const violations = countViolations(moves, machine);
      return assertEq(violations.x + violations.y + violations.z, 0);
    }
  },
  {
    name: 'limits: over-travel X flagged',
    fn: () => {
      const machine = { linear: { x:{min:-5,max:5}, y:{min:-3.5,max:3.5}, z:{min:-2.5,max:2.5} }, rotary: { a:{min:-35,max:135}, b:{min:-360,max:360,continuous:true} } };
      const parsed = window.CycleCAD.PentacadSim.parseGCode('G20 G90\nG0 X10 Y0 Z0');
      const exec = window.CycleCAD.PentacadSim.createExecutor();
      parsed.lines.forEach(l => exec.step(l));
      const moves = exec.getMoves ? exec.getMoves() : (exec.moves || []);
      const violations = countViolations(moves, machine);
      return assertTruthy(violations.x > 0, 'X violations');
    }
  },
  {
    name: 'limits: continuous B never violates',
    fn: () => {
      const machine = { linear: { x:{min:-5,max:5}, y:{min:-3.5,max:3.5}, z:{min:-2.5,max:2.5} }, rotary: { a:{min:-35,max:135}, b:{min:-360,max:360,continuous:true} } };
      const parsed = window.CycleCAD.PentacadSim.parseGCode('G20 G90\nG0 X0 Y0 B7200'); // 20 full rotations
      const exec = window.CycleCAD.PentacadSim.createExecutor();
      parsed.lines.forEach(l => exec.step(l));
      const moves = exec.getMoves ? exec.getMoves() : (exec.moves || []);
      const violations = countViolations(moves, machine);
      return assertEq(violations.b, 0);
    }
  }
]);

function countViolations(moves, machine) {
  const v = { x: 0, y: 0, z: 0, a: 0, b: 0 };
  for (const mv of moves) {
    if (!mv.to) continue;
    for (const axis of ['x', 'y', 'z']) {
      const inInches = mv.to[axis] / 25.4;
      if (inInches < machine.linear[axis].min || inInches > machine.linear[axis].max) v[axis]++;
    }
    if (!machine.rotary.a.continuous && typeof mv.to.a === 'number') {
      if (mv.to.a < machine.rotary.a.min || mv.to.a > machine.rotary.a.max) v.a++;
    }
    if (!machine.rotary.b.continuous && typeof mv.to.b === 'number') {
      if (mv.to.b < machine.rotary.b.min || mv.to.b > machine.rotary.b.max) v.b++;
    }
  }
  return v;
}

// ═══════════════════════════════════════════════════════════════════════════
// TEST DEFINITIONS — pentacad-cam.js
// ═══════════════════════════════════════════════════════════════════════════

defineModule('cam', 'pentacad-cam.js · CAM toolpaths', [
  {
    name: 'module loaded on window.CycleCAD.PentacadCAM',
    fn: () => assertTruthy(window.CycleCAD?.PentacadCAM, 'PentacadCAM')
  },
  {
    name: 'self-test: runSelfTests() allPass',
    fn: () => {
      const cam = window.CycleCAD?.PentacadCAM;
      if (!cam || !cam.runSelfTests) return { pass: true, detail: 'skip: module has no runSelfTests' };
      const r = cam.runSelfTests();
      return assertTruthy(r.allPass, `${r.results?.length || 0} tests`);
    }
  },
  {
    name: 'strategy list includes Pocket',
    fn: () => {
      const cam = window.CycleCAD?.PentacadCAM;
      if (!cam?.STRATEGIES) return { pass: true, detail: 'skip: no STRATEGIES export' };
      return assertTruthy(Object.keys(cam.STRATEGIES).some(k => /pocket/i.test(k)), 'pocket strategy');
    }
  },
  {
    name: 'strategy list includes Drill',
    fn: () => {
      const cam = window.CycleCAD?.PentacadCAM;
      if (!cam?.STRATEGIES) return { pass: true, detail: 'skip' };
      return assertTruthy(Object.keys(cam.STRATEGIES).some(k => /drill/i.test(k)), 'drill strategy');
    }
  },
  {
    name: 'strategy list includes Chamfer',
    fn: () => {
      const cam = window.CycleCAD?.PentacadCAM;
      if (!cam?.STRATEGIES) return { pass: true, detail: 'skip' };
      return assertTruthy(Object.keys(cam.STRATEGIES).some(k => /chamfer/i.test(k)), 'chamfer strategy');
    }
  },
  {
    name: 'post-processor emits G20 G90 G54 header',
    fn: () => {
      const cam = window.CycleCAD?.PentacadCAM;
      if (!cam?.emitGCode) return { pass: true, detail: 'skip: no emitGCode' };
      const dummyToolpath = [{ x: 0, y: 0, z: 0, mode: 'rapid' }];
      const gcode = cam.emitGCode(dummyToolpath, { units: 'inch', planeCode: 'G17', distanceCode: 'G90', wcsDefault: 'G54' });
      return assertTruthy(/G20/.test(gcode) && /G90/.test(gcode) && /G54/.test(gcode), 'header codes');
    }
  },
  {
    name: 'post-processor emits 4-decimal coords',
    fn: () => {
      const cam = window.CycleCAD?.PentacadCAM;
      if (!cam?.emitGCode) return { pass: true, detail: 'skip' };
      const tp = [{ x: 1.23456789, y: 0, z: 0, mode: 'rapid' }];
      const gcode = cam.emitGCode(tp, { units: 'inch', decimalPlacesLinear: 4 });
      return assertTruthy(/X1\.2346/.test(gcode) || /X1\.23456789/.test(gcode), 'decimal rounding');
    }
  }
]);

defineModule('integration', 'Integration · CAM → Sim round-trip', [
  {
    name: 'parse + execute a face-mill program end-to-end',
    fn: () => {
      const gcode = `G20 G90 G94 G17 G40 G54
T1 M6
S15000 M3
G0 Z0.2
G0 X-0.9 Y-0.6
G1 Z-0.02 F30
G1 X0.9
G0 Z0.5
M5 M30`;
      const parsed = window.CycleCAD.PentacadSim.parseGCode(gcode);
      if (parsed.errors.length > 0) return { pass: false, detail: `${parsed.errors.length} parse errors` };
      const exec = window.CycleCAD.PentacadSim.createExecutor();
      parsed.lines.forEach(l => exec.step(l));
      const moves = exec.getMoves ? exec.getMoves() : (exec.moves || []);
      return assertTruthy(moves.length >= 3, `got ${moves.length} moves`);
    }
  },
  {
    name: 'peck drill G83 emits multiple moves',
    fn: () => {
      const gcode = 'G20 G90\nG83 X0 Y0 Z-0.2 R0.1 Q0.05 F4';
      const parsed = window.CycleCAD.PentacadSim.parseGCode(gcode);
      const exec = window.CycleCAD.PentacadSim.createExecutor();
      parsed.lines.forEach(l => exec.step(l));
      const moves = exec.getMoves ? exec.getMoves() : (exec.moves || []);
      // G83 pecking to 0.2" with Q=0.05 should be ~4 pecks = 8+ moves
      return assertTruthy(moves.length >= 4, `got ${moves.length} moves (expected 4+ for G83 peck)`);
    }
  },
  {
    name: '5-axis: G93 inverse-time followed by A move',
    fn: () => {
      const gcode = 'G20 G90\nG93\nG1 A30 F3\nG94\nG1 X1 F30';
      const parsed = window.CycleCAD.PentacadSim.parseGCode(gcode);
      const exec = window.CycleCAD.PentacadSim.createExecutor();
      parsed.lines.forEach(l => exec.step(l));
      const moves = exec.getMoves ? exec.getMoves() : (exec.moves || []);
      // Should have at least 2 motion lines
      return assertTruthy(moves.length >= 2, `got ${moves.length} moves`);
    }
  },
  {
    name: 'limit check flags deliberate over-travel',
    fn: () => {
      const gcode = 'G20 G90\nG1 X100 Y100 F10';
      const machine = { linear: { x:{min:-5,max:5}, y:{min:-3.5,max:3.5}, z:{min:-2.5,max:2.5} }, rotary: { a:{min:-35,max:135}, b:{min:-360,max:360,continuous:true} } };
      const parsed = window.CycleCAD.PentacadSim.parseGCode(gcode);
      const exec = window.CycleCAD.PentacadSim.createExecutor();
      parsed.lines.forEach(l => exec.step(l));
      const moves = exec.getMoves ? exec.getMoves() : (exec.moves || []);
      const v = countViolations(moves, machine);
      return assertTruthy(v.x > 0 && v.y > 0, `violations: ${JSON.stringify(v)}`);
    }
  },
  {
    name: 'bottle-opener sample program parses without errors',
    fn: () => {
      const gcode = `( Pentacad: bottle-opener-ring )
G20 G90 G94 G17 G40 G54
T2 M6
S18000 M3
G0 A0 B0
G0 X-0.6 Y0 Z0.2
G1 Z-0.02 F10
G2 X-0.6 Y0 I0.6 J0 F20
G93
G1 B90 F2
G94
G0 Z0.2
M5 M30`;
      const parsed = window.CycleCAD.PentacadSim.parseGCode(gcode);
      return assertEq(parsed.errors.length, 0);
    }
  },
  {
    name: '1000-line program parses in < 200ms',
    fn: () => {
      const lines = [];
      lines.push('G20 G90 G94');
      for (let i = 0; i < 1000; i++) {
        lines.push(`G1 X${(i * 0.01).toFixed(4)} Y${(i * 0.005).toFixed(4)} F30`);
      }
      const gcode = lines.join('\n');
      const t0 = performance.now();
      const parsed = window.CycleCAD.PentacadSim.parseGCode(gcode);
      const elapsed = performance.now() - t0;
      if (elapsed > 200) return { pass: false, detail: `parse took ${elapsed.toFixed(1)}ms (budget 200ms)` };
      return { pass: true, detail: `${elapsed.toFixed(1)}ms for ${parsed.lines.length} lines` };
    }
  }
]);
