<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>pentacad-sim.js focused tests</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  body { font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, sans-serif; padding: 24px; max-width: 900px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
  .subtitle { color: #5C6770; margin-bottom: 20px; }
  .btn { background: #15B573; color: #fff; border: 0; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; }
  .btn.ghost { background: #FAFBFC; color: #1F2529; border: 1px solid #E3E7EA; margin-left: 8px; }
  .summary { margin: 18px 0; padding: 14px 18px; background: #FAFBFC; border: 1px solid #E3E7EA; border-radius: 8px; font-family: monospace; }
  .test { padding: 6px 10px; font-family: monospace; font-size: 12px; border-bottom: 1px solid #F0F3F5; }
  .pass { color: #0E8F5A; }
  .fail { color: #E04444; font-weight: 600; }
  .detail { color: #8A949D; font-size: 11px; display: block; margin-left: 20px; }
  p.link { font-size: 13px; color: #5C6770; margin-top: 20px; }
</style>
</head>
<body>
<h1>pentacad-sim.js — focused test suite</h1>
<div class="subtitle">Parser, modal executor, forward kinematics, soft-limit check. All in browser, no server.</div>

<button class="btn" onclick="run()">▶ Run tests</button>
<button class="btn ghost" onclick="location.href='./pentacad-all-tests.html'">Full suite →</button>

<div class="summary" id="summary">No run yet. Click "Run tests".</div>
<div id="results"></div>

<p class="link">For the complete test dashboard across all Pentacad modules, open
<a href="./pentacad-all-tests.html">pentacad-all-tests.html</a>.</p>

<script src="../js/modules/pentacad-sim.js"></script>
<script>
'use strict';

const sim = window.CycleCAD?.PentacadSim;

function run() {
  const results = [];
  const t0 = performance.now();

  if (!sim) {
    document.getElementById('summary').innerHTML = '<span class="fail">✗ pentacad-sim.js did not load</span>';
    return;
  }

  // Delegate to the module's own self-tests
  if (sim.runSelfTests) {
    const r = sim.runSelfTests();
    (r.results || []).forEach(x => results.push({
      name: x.name,
      pass: x.pass,
      detail: x.detail || (x.pass ? '' : `expected ≈${x.expected}, actual ${x.actual}`)
    }));
  } else {
    results.push({ name: 'runSelfTests exists', pass: false, detail: 'module missing runSelfTests()' });
  }

  // Add a few extra integration-ish tests specific to this page
  results.push(extraTest('parse a 50-line program', () => {
    const lines = Array.from({length: 50}, (_, i) => `G1 X${i.toFixed(3)} Y${(i*0.5).toFixed(3)} F30`).join('\n');
    const r = sim.parseGCode(lines);
    return r.lines.length === 50 && r.errors.length === 0;
  }));

  results.push(extraTest('parse all Pentamachine-dialect codes', () => {
    const r = sim.parseGCode('G20 G90 G94 G17 G40 G54 T1 M6 S10000 M3 M8 G1 X0 Y0 Z0 F10 M9 M5 M30');
    return r.errors.length === 0;
  }));

  results.push(extraTest('arc G2 I/J parses', () => {
    const r = sim.parseGCode('G2 X1 Y0 I-0.5 J0 F20');
    return r.errors.length === 0 && r.lines[0].words.length === 6;
  }));

  results.push(extraTest('arc G3 R parses', () => {
    const r = sim.parseGCode('G3 X1 Y0 R0.5 F20');
    return r.errors.length === 0;
  }));

  const pass = results.filter(r => r.pass).length;
  const fail = results.length - pass;
  const elapsed = performance.now() - t0;

  document.getElementById('summary').innerHTML =
    `<b>${pass}/${results.length}</b> passed · <b class="${fail > 0 ? 'fail' : 'pass'}">${fail}</b> failed · ${elapsed.toFixed(1)} ms`;

  document.getElementById('results').innerHTML = results.map(r => `
    <div class="test">
      <span class="${r.pass ? 'pass' : 'fail'}">${r.pass ? '✓' : '✗'}</span> ${r.name}
      ${r.detail ? `<span class="detail">${r.detail}</span>` : ''}
    </div>
  `).join('');
}

function extraTest(name, fn) {
  try {
    const ok = fn();
    return { name, pass: !!ok, detail: '' };
  } catch (err) {
    return { name, pass: false, detail: err.message };
  }
}

setTimeout(run, 100);
</script>
</body>
</html>
