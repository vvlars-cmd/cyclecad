<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExplodeView Integration Runner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f2f5;
            color: #1a1a2e;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        header {
            background-color: #ffffff;
            border-bottom: 1px solid #d0d7de;
            padding: 16px 20px;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            max-width: 2000px;
            margin: 0 auto;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .header-title {
            font-size: 18px;
            font-weight: 700;
            color: #0969da;
        }

        .progress-section {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 300px;
        }

        .progress-bar-container {
            flex: 1;
            height: 8px;
            background-color: #d0d7de;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #0969da, #54aeff);
            width: 0%;
            transition: width 0.3s ease;
        }

        .step-counter {
            font-size: 12px;
            color: #57606a;
            white-space: nowrap;
        }

        .header-controls {
            display: flex;
            gap: 8px;
        }

        button {
            padding: 8px 16px;
            border-radius: 6px;
            border: 1px solid #d0d7de;
            background-color: #ffffff;
            color: #1a1a2e;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }

        button:hover:not(:disabled) {
            background-color: #f0f2f5;
            border-color: #0969da;
        }

        .btn-primary {
            background-color: #0969da;
            border-color: #0969da;
            color: #fff;
        }

        .btn-primary:hover:not(:disabled) {
            background-color: #0860ca;
            border-color: #0860ca;
        }

        .btn-danger {
            background-color: #cf222e;
            border-color: #cf222e;
            color: #fff;
        }

        .btn-danger:hover:not(:disabled) {
            background-color: #a40e26;
            border-color: #a40e26;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Main Container */
        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 0;
        }

        /* Left Panel - Tutorial Steps */
        .tutorial-panel {
            width: 35%;
            background-color: #ffffff;
            border-right: 1px solid #d0d7de;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .steps-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .steps-container::-webkit-scrollbar {
            width: 8px;
        }

        .steps-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .steps-container::-webkit-scrollbar-thumb {
            background-color: #c1c8cf;
            border-radius: 4px;
        }

        .steps-container::-webkit-scrollbar-thumb:hover {
            background-color: #57606a;
        }

        /* Step Card */
        .step-card {
            background-color: #f6f8fa;
            border: 1px solid #d0d7de;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .step-card:hover {
            border-color: #0969da;
            background-color: #eaf5ff;
        }

        .step-card.active {
            background-color: #ddf4ff;
            border-color: #0969da;
            animation: pulse 1s infinite;
        }

        .step-card.active .step-badge {
            background-color: #0969da;
            color: #fff;
        }

        .step-card.completed {
            border-color: #1a7f37;
            background-color: #dafbe1;
        }

        .step-card.completed .step-badge {
            background-color: #1a7f37;
            color: #fff;
        }

        .step-card.completed::after {
            content: " ✓";
            color: #1a7f37;
            font-weight: 700;
            margin-left: 4px;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(9, 105, 218, 0.4);
            }
            50% {
                box-shadow: 0 0 0 10px rgba(9, 105, 218, 0);
            }
        }

        .step-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .step-badge {
            background-color: #0969da;
            color: #ffffff;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .step-title {
            font-size: 14px;
            font-weight: 600;
            color: #1a1a2e;
            flex: 1;
        }

        .step-status {
            font-size: 11px;
            color: #57606a;
        }

        .step-description {
            font-size: 13px;
            color: #57606a;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .step-details {
            display: none;
            background-color: #eaf5ff;
            border-left: 2px solid #0969da;
            padding: 8px 12px;
            border-radius: 4px;
            margin-bottom: 8px;
            font-size: 12px;
            color: #1a1a2e;
            line-height: 1.5;
        }

        .step-details.expanded {
            display: block;
        }

        .step-code {
            background-color: #f6f8fa;
            border: 1px solid #d0d7de;
            border-radius: 4px;
            padding: 8px;
            margin-top: 4px;
            font-family: 'Monaco', monospace;
            font-size: 11px;
            color: #79c0ff;
            overflow-x: auto;
        }

        .step-actions {
            display: flex;
            gap: 8px;
        }

        .step-run-btn {
            flex: 1;
            padding: 8px 12px;
            font-size: 12px;
            background-color: #0969da;
            border-color: #0969da;
            color: #ffffff;
            font-weight: 600;
            border-radius: 4px;
        }

        .step-run-btn:hover:not(:disabled) {
            background-color: #79c0ff;
            border-color: #79c0ff;
        }

        .step-run-btn:disabled {
            background-color: #d0d7de;
            border-color: #d0d7de;
            color: #57606a;
        }

        .step-details-toggle {
            padding: 6px 10px;
            font-size: 11px;
            background-color: transparent;
            border: 1px solid #d0d7de;
        }

        /* Right Panel - App Preview */
        .app-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #ffffff;
            overflow: hidden;
        }

        .app-header {
            background-color: #f6f8fa;
            border-bottom: 1px solid #d0d7de;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .app-header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .app-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #238636;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 49%, 100% { opacity: 1; }
            50%, 99% { opacity: 0.5; }
        }

        .app-url {
            font-size: 12px;
            color: #57606a;
        }

        .app-actions {
            display: flex;
            gap: 8px;
        }

        .app-actions button {
            padding: 6px 12px;
            font-size: 12px;
        }

        #app-frame {
            flex: 1;
            border: none;
            background-color: #fff;
        }

        /* Floating Shortcuts Panel */
        .shortcuts-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 320px;
            max-height: 500px;
            background-color: #f6f8fa;
            border: 1px solid #d0d7de;
            border-radius: 8px;
            display: none;
            flex-direction: column;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            z-index: 200;
        }

        .shortcuts-panel.visible {
            display: flex;
        }

        .shortcuts-header {
            padding: 12px 16px;
            border-bottom: 1px solid #d0d7de;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .shortcuts-header h3 {
            font-size: 14px;
            font-weight: 600;
        }

        .shortcuts-close {
            background: none;
            border: none;
            color: #57606a;
            cursor: pointer;
            padding: 0;
            font-size: 16px;
        }

        .shortcuts-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
        }

        .shortcuts-content::-webkit-scrollbar {
            width: 6px;
        }

        .shortcuts-content::-webkit-scrollbar-thumb {
            background-color: #d0d7de;
            border-radius: 3px;
        }

        .shortcut-item {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 8px;
            font-size: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #d0d7de;
        }

        .shortcut-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .shortcut-key {
            background-color: #ffffff;
            border: 1px solid #d0d7de;
            border-radius: 4px;
            padding: 2px 6px;
            font-family: 'Monaco', monospace;
            font-weight: 600;
            color: #0969da;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .shortcut-desc {
            color: #57606a;
        }

        .shortcuts-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: #0969da;
            border: none;
            color: #ffffff;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            z-index: 150;
        }

        .shortcuts-toggle:hover {
            background-color: #79c0ff;
            transform: scale(1.1);
        }

        .shortcuts-toggle.hidden {
            display: none;
        }

        /* Footer */
        footer {
            background-color: #f6f8fa;
            border-top: 1px solid #d0d7de;
            padding: 12px 20px;
            flex-shrink: 0;
            font-size: 12px;
            color: #57606a;
        }

        /* Loading Spinner */
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(88, 166, 255, 0.3);
            border-top-color: #0969da;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .container {
                flex-direction: column;
            }

            .tutorial-panel {
                width: 100%;
                height: 40%;
                border-right: none;
                border-bottom: 1px solid #d0d7de;
            }

            .app-panel {
                height: 60%;
            }
        }

        /* Tooltip */
        .tooltip {
            position: absolute;
            background-color: #eaeef2;
            color: #1a1a2e;
            padding: 8px 12px;
            border-radius: 4px;
            border: 1px solid #d0d7de;
            font-size: 12px;
            white-space: nowrap;
            z-index: 1000;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .tooltip.visible {
            opacity: 1;
        }

        /* Message Box */
        .message-box {
            background-color: #eaeef2;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 12px;
            font-size: 12px;
            color: #57606a;
        }

        .message-box.warning {
            border-color: #d29922;
            background-color: rgba(210, 153, 34, 0.1);
            color: #d0883c;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="header-content">
            <div class="header-left">
                <div class="header-title">ExplodeView Integration Runner</div>
            </div>
            <div class="progress-section">
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div class="step-counter" id="stepCounter">Step 0 of 57</div>
            </div>
            <div class="header-controls">
                <button class="btn-primary" id="runAllBtn">▶ Run All</button>
                <button class="btn-danger" id="stopBtn" disabled>⏹ Stop</button>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <div class="container">
        <!-- Left Panel - Tutorial Steps -->
        <div class="tutorial-panel">
            <div class="steps-container" id="stepsContainer"></div>
            <footer>
                <div id="footerText">Select a step to begin</div>
            </footer>
        </div>

        <!-- Right Panel - App Preview -->
        <div class="app-panel">
            <div class="app-header">
                <div class="app-header-left">
                    <div class="app-indicator" id="appIndicator"></div>
                    <div class="app-url">cyclecad.com/app/ (Viewer Mode)</div>
                </div>
                <div class="app-actions">
                    <button id="openTabBtn">↗ Open in Tab</button>
                    <button id="reloadAppBtn">⟳ Reload</button>
                </div>
            </div>
            <iframe id="app-frame" src="../"></iframe>
            <div class="message-box warning" style="margin: 12px; display: none;" id="crossOriginMsg">
                <strong>Note:</strong> If steps don't auto-execute, ensure cycleCAD is loaded. Open in a separate tab and follow along manually.
            </div>
        </div>
    </div>

    <!-- Floating Shortcuts Panel -->
    <button class="shortcuts-toggle" id="shortcutsToggle" title="Keyboard Shortcuts (?)">?</button>
    <div class="shortcuts-panel" id="shortcutsPanel">
        <div class="shortcuts-header">
            <h3>Keyboard Shortcuts</h3>
            <button class="shortcuts-close" id="shortcutsClose">✕</button>
        </div>
        <div class="shortcuts-content" id="shortcutsContent"></div>
    </div>

    <script>
        // Tutorial Steps Data - ExplodeView Integration Features
        const TUTORIAL_STEPS = [
            // Part 1: Viewer Mode Basics (Steps 1-10)
            {
                number: 1,
                title: "Toggle Viewer Mode",
                description: "Switch to ExplodeView visualization",
                detail: "Press 'V' to toggle between modeling and viewing modes. This enables the ExplodeView toolbar with 57+ analysis and visualization tools.",
                key: "v",
                type: "key",
                category: "Viewer Mode Basics"
            },
            {
                number: 2,
                title: "Fit to All",
                description: "Auto-zoom to fit entire assembly",
                detail: "Press 'F' to zoom and pan the view to show all components with proper framing.",
                key: "f",

            },
            {
                number: 3,

            {

            {

            {

            // Part 2: Explode & Assembly (Steps 11-20)
            {
                number: 11,

                key: "e",
                type: "key",

            },
            {

            {

            {

            {

            // Part 3: Section Cut & Clipping (Steps 21-30)
            {

            {
                number: 22,
                title: "X-Axis Clipping",

            {
                number: 23,

            {

            },
            {
                number: 27,
                title: "Per-Material Clipping",
                description: "Apply clipping per material type",
                detail: "Toggle per-material clipping to clip each material group independently.",
                control: "toggle",

            },
            {
                number: 28,
                title: "DoubleSide Rendering",
                description: "See both sides of cut surface",

                control: "toggle",

                category: "Section Cut & Clipping"
            },
            {
                number: 29,
                title: "Hide Clipping Plane",

            {

                title: "Close Section Cut",

                type: "key",

        // Keyboard shortcuts reference
        const SHORTCUTS_REFERENCE = {
            'V': 'Toggle Viewer Mode',
            'E': 'Explode/Collapse Assembly',
            'C': 'Section Cut (Cross-Section)',
            'W': 'Wireframe Toggle',
            'G': 'Grid Floor Toggle',
            'F': 'Fit to All',
            'S': 'Screenshot Export',
            'M': 'Measurement Tool',
            'A': 'Annotations',
            '?': 'Help / Shortcuts Panel',
            'Ctrl+Shift+F': 'Performance Monitor',
            'Delete': 'Hide Selected Part'
        };

        // UI State
        let currentStep = 0;
        let isRunning = false;
        let completedSteps = new Set();

        // Initialize
        function init() {
            renderSteps();
            setupEventListeners();
            populateShortcuts();
            updateProgress();
        }

        // Render all step cards
        function renderSteps() {
            const container = document.getElementById('stepsContainer');
            container.innerHTML = '';

            TUTORIAL_STEPS.forEach((step, idx) => {
                const card = document.createElement('div');
                card.className = 'step-card';
                card.id = `step-${idx}`;
                if (completedSteps.has(idx)) card.classList.add('completed');

                card.innerHTML = `
                    <div class="step-header">
                        <div class="step-badge">${step.number}</div>
                        <div class="step-title">${step.title}</div>
                        <div class="step-status">${step.category}</div>
                    </div>
                    <div class="step-description">${step.description}</div>
                    <div class="step-details" id="details-${idx}">${step.detail}</div>
                    <div class="step-actions">
                        <button class="step-run-btn" onclick="runStep(${idx})">▶ Run</button>
                        <button class="step-details-toggle" onclick="toggleDetails(${idx})">Details</button>
                    </div>
                `;

                card.addEventListener('click', (e) => {
                    if (e.target.tagName !== 'BUTTON') {
                        selectStep(idx);
                    }
                });

                container.appendChild(card);
            });
        }

        // Select step
        function selectStep(idx) {
            document.querySelectorAll('.step-card.active').forEach(el => el.classList.remove('active'));
            document.getElementById(`step-${idx}`).classList.add('active');
            currentStep = idx;
            updateFooter();
        }

        // Toggle details
        function toggleDetails(idx) {
            const details = document.getElementById(`details-${idx}`);
            details.classList.toggle('expanded');
        }

        // Run single step
        function runStep(idx) {
            const step = TUTORIAL_STEPS[idx];
            selectStep(idx);
            executeStep(step);
            completedSteps.add(idx);
            document.getElementById(`step-${idx}`).classList.add('completed');
            updateProgress();
        }

        // Execute step action
        function executeStep(step) {
            const iframe = document.getElementById('app-frame');
            try {
                if (step.type === 'key') {
                    sendKeyPress(iframe, step.key);
                } else if (step.type === 'mouse') {
                    // Mouse actions are simulated
                    console.log(`Simulated ${step.mouse} on app`);
                } else if (step.type === 'button') {
                    sendButtonClick(iframe, step.button);
                } else if (step.type === 'control') {
                    console.log(`Interact with ${step.control} control`);
                } else if (step.type === 'panel') {
                    console.log(`Check ${step.panel} panel`);
                }
            } catch (e) {
                console.log('Note: Some actions may require manual execution due to cross-origin restrictions');
            }
        }

        // Send key press to iframe
        function sendKeyPress(iframe, key) {
            try {
                const keyMap = {
                    'v': 'KeyV',
                    'e': 'KeyE',
                    'c': 'KeyC',
                    'w': 'KeyW',
                    'g': 'KeyG',
                    'f': 'KeyF',
                    's': 'KeyS',
                    'm': 'KeyM',
                    'a': 'KeyA',
                    '?': 'Slash'
                };

                const code = keyMap[key.toLowerCase()] || key;
                const event = new KeyboardEvent('keydown', {
                    key: key,
                    code: code,
                    bubbles: true
                });
                iframe.contentDocument?.dispatchEvent(event);
            } catch (e) {
                console.log('Cannot send keypress to iframe (cross-origin)');
            }
        }

        // Send button click to iframe
        function sendButtonClick(iframe, buttonId) {
            try {
                const btn = iframe.contentDocument?.querySelector(`[data-button="${buttonId}"]`);
                if (btn) btn.click();
            } catch (e) {
                console.log('Cannot click button in iframe (cross-origin)');
            }
        }

        // Run all steps
        function runAll() {
            isRunning = true;
            document.getElementById('runAllBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;

            let idx = 0;
            const interval = setInterval(() => {
                if (!isRunning || idx >= TUTORIAL_STEPS.length) {
                    isRunning = false;
                    document.getElementById('runAllBtn').disabled = false;
                    document.getElementById('stopBtn').disabled = true;
                    clearInterval(interval);
                    return;
                }
                runStep(idx++);
            }, 1000);
        }

        // Stop running
        function stopRunning() {
            isRunning = false;
            document.getElementById('runAllBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
        }

        // Update progress
        function updateProgress() {
            const completed = completedSteps.size;
            const total = TUTORIAL_STEPS.length;
            const percent = (completed / total) * 100;

            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('stepCounter').textContent = `Step ${completed} of ${total}`;
        }

        // Update footer
        function updateFooter() {
            const step = TUTORIAL_STEPS[currentStep];
            document.getElementById('footerText').textContent = `${step.number}. ${step.title}`;
        }

        // Populate shortcuts panel
        function populateShortcuts() {
            const content = document.getElementById('shortcutsContent');
            Object.entries(SHORTCUTS_REFERENCE).forEach(([key, desc]) => {
                const item = document.createElement('div');
                item.className = 'shortcut-item';
                item.innerHTML = `
                    <span class="shortcut-desc">${desc}</span>
                    <span class="shortcut-key">${key}</span>
                `;
                content.appendChild(item);
            });
        }

        // Setup event listeners
        function setupEventListeners() {
            document.getElementById('runAllBtn').addEventListener('click', runAll);
            document.getElementById('stopBtn').addEventListener('click', stopRunning);
            document.getElementById('shortcutsToggle').addEventListener('click', () => {
                const panel = document.getElementById('shortcutsPanel');
                panel.classList.toggle('visible');
            });
            document.getElementById('shortcutsClose').addEventListener('click', () => {
                document.getElementById('shortcutsPanel').classList.remove('visible');
            });
            document.getElementById('openTabBtn').addEventListener('click', () => {
                window.open('../', '_blank');
            });
            document.getElementById('reloadAppBtn').addEventListener('click', () => {
                document.getElementById('app-frame').src += '?t=' + Date.now();
            });
        }

        // Start
        init();
    </script>
