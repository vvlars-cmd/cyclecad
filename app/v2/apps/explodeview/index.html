<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ExplodeView — cycleCAD Suite</title>
<link rel="stylesheet" href="../../shared/theme.css">
<style>
  body { margin: 0; min-height: 100vh; display: grid; grid-template-rows: auto 1fr;
         font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; }
  header.suite-bar {
    background: #0E1117; color: #fff; padding: 12px 24px;
    display: flex; align-items: center; gap: 16px; font-size: 13px;
  }
  header.suite-bar .brand { font-weight: 700; letter-spacing: 4px; }
  header.suite-bar .accent { color: #3AAFA9; font-weight: 600; }
  header.suite-bar nav { margin-left: auto; display: flex; gap: 18px; font-size: 12px; }
  header.suite-bar nav a { color: #BBC2CC; text-decoration: none; }
  header.suite-bar nav a:hover { color: #fff; }
  main#app { position: relative; background: #fafafa; }
  #viewport { position: absolute; inset: 0; background: #ffffff; }
  .empty-overlay {
    position: absolute; inset: 50% 0 auto 0; transform: translateY(-50%);
    text-align: center; color: var(--pt-muted); padding: 32px; pointer-events: none;
  }
  .empty-overlay h2 { font: 600 22px Georgia, serif; margin-bottom: 6px; color: var(--pt-ink); }
  .empty-overlay p { font-size: 13px; margin: 4px 0; }
  .empty-overlay a { color: var(--pt-green); pointer-events: auto; }
</style>

<script type="importmap">
{ "imports": {
  "three":          "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
  "three/addons/":  "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
}}
</script>
</head>
<body>

<header class="suite-bar">
  <span class="brand">CYCLECAD SUITE</span>
  <span style="opacity:.6">·</span>
  <span class="accent">ExplodeView</span>
  <nav>
    <a href="../cyclecad/">cycleCAD</a>
    <a href="../pentacad/">Pentacad</a>
    <a href="../admin/">admin</a>
    <a href="../../tests/">tests</a>
  </nav>
</header>

<main id="app">
  <div id="viewport"></div>
  <div class="empty-overlay" id="empty">
    <h2>ExplodeView · Stage 1 shell</h2>
    <p>Manifest read. Kernel loaded. Viewport will fill when widget #1 (<code>viewport</code>) lands.</p>
    <p><a href="../../tests/">Open test dashboard →</a></p>
  </div>
</main>

<script type="module">
import { meter } from '../../shared/meter.js';
import { loadWidget } from '../../shared/loader.js';
import { Toast } from '../../shared/ui-primitives.js';
import { get } from '../../shared/widget-registry.js';

const APP = 'explodeview';
const manifest = await fetch('./manifest.json').then(r => r.json());

let mountedAny = false;
for (const name of manifest.preload) {
  const entry = get(name);
  if (!entry || entry.status === 'stub') continue;
  try {
    await loadWidget(name, {
      mount: name === 'viewport' ? '#viewport' : '#app',
      app:   APP,
      meter,
    });
    mountedAny = true;
  } catch (err) {
    console.warn(`[explodeview] ${name} failed:`, err);
  }
}

if (mountedAny) document.getElementById('empty').style.display = 'none';
Toast.show(`${APP} ready · ${manifest.preload.length} preload widgets`);
</script>

</body>
</html>
