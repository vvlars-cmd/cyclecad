<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Pentacad — cycleCAD Suite</title>
<link rel="stylesheet" href="../../shared/theme.css">
<style>
  body { margin: 0; min-height: 100vh; display: grid; grid-template-rows: auto 1fr;
         font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; }
  header.suite-bar {
    background: #0E1117; color: #fff; padding: 12px 24px;
    display: flex; align-items: center; gap: 16px; font-size: 13px;
  }
  header.suite-bar .brand { font-weight: 700; letter-spacing: 4px; }
  header.suite-bar .accent { color: #10B981; font-weight: 600; }
  header.suite-bar nav { margin-left: auto; display: flex; gap: 18px; font-size: 12px; }
  header.suite-bar nav a { color: #BBC2CC; text-decoration: none; }
  header.suite-bar nav a:hover { color: #fff; }
  main#app { position: relative; background: #0E1117; }
  #sim-host { position: absolute; inset: 0; }
  .empty-overlay {
    position: absolute; inset: 50% 0 auto 0; transform: translateY(-50%);
    text-align: center; color: #94a3b8; padding: 32px; pointer-events: none;
  }
  .empty-overlay h2 { font: 600 22px Georgia, serif; margin-bottom: 6px; color: #fff; }
  .empty-overlay p { font-size: 13px; margin: 4px 0; }
  .empty-overlay a { color: #10B981; pointer-events: auto; }
</style>

<script type="importmap">
{ "imports": {
  "three":          "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
  "three/addons/":  "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
}}
</script>
</head>
<body>

<header class="suite-bar">
  <span class="brand">CYCLECAD SUITE</span>
  <span style="opacity:.6">·</span>
  <span class="accent">Pentacad</span>
  <nav>
    <a href="../cyclecad/">cycleCAD</a>
    <a href="../explodeview/">ExplodeView</a>
    <a href="../admin/">admin</a>
    <a href="../../tests/">tests</a>
  </nav>
</header>

<main id="app">
  <div id="sim-host"></div>
  <div class="empty-overlay" id="empty">
    <h2>Pentacad · 5-axis simulator</h2>
    <p>Loading kinematic chain · Penta Machine envelope · NGC parser…</p>
  </div>
</main>

<script type="module">
import { meter } from '../../shared/meter.js';
import { Toast } from '../../shared/ui-primitives.js';
import { init as initSim } from '../../widgets/pentacad-simulator.js';

const APP = 'pentacad';

try {
  const handle = await initSim({
    mount: '#sim-host',
    app:   APP,
    meter,
    params: { machineId: 'v2-50', autoplay: false },
  });
  document.getElementById('empty').style.display = 'none';
  /** @type {any} */ (window).PentacadSim = handle.api;
  Toast.show(`${APP} ready · simulator armed · click ▶ to play`);
} catch (err) {
  document.getElementById('empty').innerHTML =
    `<h2>Pentacad — boot error</h2><p>${err && err.message ? err.message : err}</p>`;
  console.error('[pentacad] simulator failed to mount', err);
}
</script>

</body>
</html>
