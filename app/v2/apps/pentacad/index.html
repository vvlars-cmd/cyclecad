<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Pentacad — cycleCAD Suite</title>
<style>
  /*
   * Pentacad app shell — uses the EXISTING simulator at
   * /app/pentacad-sim.html verbatim via iframe.
   *
   * Sachin maintains the canonical Pentacad simulator as a single 3,423-LOC
   * standalone HTML at https://cyclecad.com/app/pentacad-sim.html — a
   * hand-tuned clone of sim.pentamachine.com. It already has the right
   * look, the right machine GLBs, the right kinematic scaling, and a
   * working DRO + playback + CHANGE MACHINE flow.
   *
   * Repeated attempts to re-implement it as a Suite-native widget kept
   * missing the look or introducing TDZ / scaling / model-too-small bugs.
   * Lesson: don't rebuild what already works. The Suite shell hosts the
   * standalone via iframe — same domain, no cross-origin issues, identical
   * look-and-feel because it IS the standalone.
   *
   * The Suite's per-app navigation bar sits above the iframe so links
   * back to cycleCAD / ExplodeView / admin / tests still work.
   */
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden;
               font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
  body { display: grid; grid-template-rows: auto 1fr; }

  header.suite-bar {
    background: #1A2828; color: #D7DCDE;
    padding: 10px 20px;
    display: flex; align-items: center; gap: 14px;
    font-size: 12px; line-height: 1; flex-shrink: 0;
    border-bottom: 1px solid #0E1717;
  }
  header.suite-bar .brand {
    font-weight: 700; letter-spacing: 4px; color: #FFFFFF;
  }
  header.suite-bar .accent {
    color: #15B573; font-weight: 600;
  }
  header.suite-bar nav {
    margin-left: auto; display: flex; gap: 16px; font-size: 12px;
  }
  header.suite-bar nav a {
    color: #8A949D; text-decoration: none;
    transition: color 0.15s;
  }
  header.suite-bar nav a:hover { color: #FFFFFF; }
  header.suite-bar a.standalone {
    color: #15B573; font-size: 11px;
    border-left: 1px solid #2A3838;
    padding-left: 14px;
    text-decoration: none;
  }
  header.suite-bar a.standalone:hover { color: #2DC589; }

  iframe.sim {
    width: 100%; height: 100%;
    border: 0; display: block;
    background: #F5F7F8;
  }
</style>
</head>
<body>

<header class="suite-bar">
  <span class="brand">CYCLECAD SUITE</span>
  <span style="opacity:.4">·</span>
  <span class="accent">Pentacad</span>
  <span style="opacity:.4; margin-left: 8px">5-axis CAM · Penta Machine</span>
  <nav>
    <a href="../cyclecad/">cycleCAD</a>
    <a href="../admin/">admin</a>
    <a href="../explodeview/">ExplodeView</a>
    <a href="../../tests/">tests</a>
    <a class="standalone"
       href="https://cyclecad.com/app/pentacad-sim.html"
       target="_blank" rel="noopener">
      ⤴ open in standalone
    </a>
  </nav>
</header>

<iframe
  class="sim"
  src="https://cyclecad.com/app/pentacad-sim.html"
  title="Pentacad Simulator"
  allow="clipboard-write; fullscreen"
  allowfullscreen
></iframe>

</body>
</html>
