<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" /><title>annotations · demo</title>
<link rel="stylesheet" href="../../shared/theme.css">
<style>
  body { margin: 0; height: 100vh; display: grid; grid-template-rows: auto 1fr; font: 13px Inter, sans-serif; }
  header.bar { background: #1B2228; color: #fff; padding: 10px 16px; display: flex; gap: 12px; align-items: center; }
  header.bar a { color: var(--pt-green); text-decoration: none; }
  #stage { position: relative; background: #fafafa; }
  .controls { position: absolute; left: 16px; top: 16px; background: #fff; border: 1px solid #e5e7eb;
              border-radius: 6px; padding: 12px; z-index: 10; display: flex; flex-direction: column; gap: 6px; max-width: 240px; }
  .controls button, .controls select { font-size: 11px; padding: 4px 8px; min-width: 140px; }
  #log { position: absolute; right: 16px; bottom: 16px; max-width: 280px; max-height: 160px; overflow: auto;
          background: rgba(0,0,0,0.78); color: #cce; padding: 10px 12px; border-radius: 4px;
          font: 11px Menlo, monospace; }
</style>
<script type="importmap">{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
}}</script>
</head><body>
<header class="bar"><strong>annotations</strong><span style="opacity:.6">demo</span><span style="flex:1"></span>
  <a href="annotations.spec.html">Run spec ↗</a> <a href="../index.html">All ↗</a></header>
<div id="stage"><div class="controls"><button id="enable">Enable adding</button><button id="clear">Clear all</button><div style="font-size:11px;color:#666;margin-top:6px">Click any cube to add a pin · click a label to edit · right-click to delete</div></div><div id="log"></div></div>
<script type="module">
const log = (...a) => { const el = document.getElementById('log'); el.innerHTML += a.join(' ') + '<br>'; el.scrollTop = el.scrollHeight; };
import * as THREE from 'three';
import { init as initViewport } from '../../widgets/viewport.js';
import { init as initAnn }     from '../../widgets/annotations.js';
import { init as initGrid }    from '../../widgets/grid.js';
const stage = document.getElementById('stage');
const v = await initViewport({ mount: stage });
await initGrid({ scene: v.api.getScene() });
for (let i = 0; i < 4; i++) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(3,3,3), new THREE.MeshStandardMaterial({ color: new THREE.Color().setHSL(i/4,.5,.5) }));
  m.position.set((i-1.5)*5, 1.5, 0); v.api.attach(m);
}
const ann = await initAnn({ mount: stage, scene: v.api.getScene(), camera: v.api.getCamera(), target: v.api.getRoot(), persist: false });
window.__ann = ann;
ann.on('add',    e => log(`+ pin (${e.point.x.toFixed(1)},${e.point.y.toFixed(1)},${e.point.z.toFixed(1)})`));
ann.on('remove', e => log(`- pin removed`));
document.getElementById('enable').addEventListener('click', () => { ann.api.toggle(); log(`adding: ${ann.api.isActive()}`); });
document.getElementById('clear').addEventListener('click', () => { ann.api.clear(); log('cleared'); });
</script>
</body></html>
