<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8" />
<title>axes · standalone demo</title>
<link rel="stylesheet" href="../../shared/theme.css">
<style>
  body { margin: 0; height: 100vh; display: grid; grid-template-rows: auto 1fr; font: 13px Inter, sans-serif; }
  header.bar { background: #1B2228; color: #fff; padding: 10px 16px; display: flex; gap: 12px; align-items: center; }
  header.bar a { color: var(--pt-green); text-decoration: none; }
  #stage { position: relative; background: #fafafa; }
  .controls { position: absolute; left: 16px; top: 16px; background: #fff;
              border: 1px solid #e5e7eb; border-radius: 6px; padding: 12px; z-index: 10;
              display: flex; flex-direction: column; gap: 6px; }
  .controls button, .controls input { font-size: 11px; padding: 4px; min-width: 140px; }
</style>
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
}}
</script>
</head><body>
<header class="bar"><strong>axes</strong><span style="opacity:.6">demo</span><span style="flex:1"></span>
  <a href="axes.spec.html">Run spec ↗</a> <a href="../index.html">All ↗</a></header>
<div id="stage">
  <div class="controls">
    <button id="toggle">Toggle</button>
    <label>Size: <input id="size" type="range" min="1" max="20" value="5"></label>
  </div>
</div>
<script type="module">
import { init as initViewport } from '../../widgets/viewport.js';
import { init as initAxes } from '../../widgets/axes.js';
import { init as initGrid } from '../../widgets/grid.js';
const stage = document.getElementById('stage');
const v = await initViewport({ mount: stage });
await initGrid({ scene: v.api.getScene() });
const a = await initAxes({ scene: v.api.getScene(), size: 5 });
window.__axes = a;
document.getElementById('toggle').addEventListener('click', () => a.api.toggle());
document.getElementById('size').addEventListener('input', e => a.api.setSize(+e.target.value));
</script>
</body></html>
