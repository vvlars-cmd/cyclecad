<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" /><title>bom-csv · demo</title>
<link rel="stylesheet" href="../../shared/theme.css">
<style>
  body { margin: 0; height: 100vh; display: grid; grid-template-rows: auto 1fr; font: 13px Inter, sans-serif; }
  header.bar { background: #1B2228; color: #fff; padding: 10px 16px; display: flex; gap: 12px; align-items: center; }
  header.bar a { color: var(--pt-green); text-decoration: none; }
  #stage { position: relative; background: #fafafa; }
  .controls { position: absolute; left: 16px; top: 16px; background: #fff; border: 1px solid #e5e7eb;
              border-radius: 6px; padding: 12px; z-index: 10; display: flex; flex-direction: column; gap: 6px; max-width: 240px; }
  .controls button, .controls select { font-size: 11px; padding: 4px 8px; min-width: 140px; }
  #log { position: absolute; right: 16px; bottom: 16px; max-width: 280px; max-height: 160px; overflow: auto;
          background: rgba(0,0,0,0.78); color: #cce; padding: 10px 12px; border-radius: 4px;
          font: 11px Menlo, monospace; }
</style>
<script type="importmap">{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
}}</script>
</head><body>
<header class="bar"><strong>bom-csv</strong><span style="opacity:.6">demo</span><span style="flex:1"></span>
  <a href="bom-csv.spec.html">Run spec ↗</a> <a href="../index.html">All ↗</a></header>
<div id="stage"><div class="controls"><button id="csv">Show CSV</button><button id="dl">Download CSV</button></div><div id="log"></div></div>
<script type="module">
const log = (...a) => { const el = document.getElementById('log'); el.innerHTML += a.join(' ') + '<br>'; el.scrollTop = el.scrollHeight; };
import * as THREE from 'three';
import { init as initViewport } from '../../widgets/viewport.js';
import { init as initBom }     from '../../widgets/bom-csv.js';
import { init as initGrid }    from '../../widgets/grid.js';
const stage = document.getElementById('stage');
const v = await initViewport({ mount: stage });
await initGrid({ scene: v.api.getScene() });
for (let i = 0; i < 6; i++) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(2+Math.random()*2,2+Math.random()*2,2+Math.random()*2),
    new THREE.MeshStandardMaterial({ color: new THREE.Color().setHSL(i/6,.6,.5) }));
  m.name = `part-${String(i+1).padStart(2,'0')}`;
  m.position.set(Math.random()*20-10, 1.5, Math.random()*20-10);
  m.userData.weight = (1 + Math.random()*5).toFixed(2);
  v.api.attach(m);
}
const bom = await initBom({ target: v.api.getRoot() });
window.__bom = bom;
document.getElementById('csv').addEventListener('click', () => { log(bom.api.toCsv().replace(/\n/g, '<br>')); });
document.getElementById('dl').addEventListener('click', async () => { const r = await bom.api.export(); log(`exported ${r.rows} rows → ${r.filename}`); });
</script>
</body></html>
