<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" /><title>drawing-generator · demo</title>
<link rel="stylesheet" href="../../shared/theme.css">
<style>
  body { margin: 0; height: 100vh; display: grid; grid-template-rows: auto 1fr; font: 13px Inter, sans-serif; }
  header.bar { background: #1B2228; color: #fff; padding: 10px 16px; display: flex; gap: 12px; align-items: center; }
  header.bar a { color: var(--pt-green); text-decoration: none; }
  #stage { position: relative; background: #fafafa; overflow: hidden; }
  #panel { position: absolute; right: 16px; top: 16px; z-index: 10; }
  #log { position: absolute; right: 16px; bottom: 16px; max-width: 320px; max-height: 200px; overflow: auto;
          background: rgba(0,0,0,0.78); color: #cce; padding: 10px 12px; border-radius: 4px;
          font: 11px Menlo, monospace; }
</style>
<script type="importmap">{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
}}</script>
</head><body>
<header class="bar"><strong>drawing-generator</strong><span style="opacity:.6">3D demo</span><span style="flex:1"></span>
  <a href="drawing-generator.spec.html">Run spec ↗</a> <a href="../index.html">All ↗</a></header>
<div id="stage"><div id="panel"></div><div id="log"></div></div>
<script type="module">
const log = (...a) => { const el = document.getElementById('log'); el.innerHTML += a.join(' ') + '<br>'; el.scrollTop = el.scrollHeight; };
const stubMeter = { charge: async () => ({ ok: true, balance: 1000000 }) };
import { init as initViewport } from '../../widgets/viewport.js';
import { init as initWidget }   from '../../widgets/drawing-generator.js';
const stage = document.getElementById('stage');
const vp = await initViewport({ mount: stage, app: 'cyclecad', meter: stubMeter });
const scene    = vp.api.getScene();
const camera   = vp.api.getCamera();
const renderer = vp.api.getRenderer();
const root     = vp.api.getRoot();
const w = await initWidget({
  mount: document.getElementById('panel'),
  app: 'cyclecad', meter: stubMeter,
  scene, camera, renderer, root,
});
window.__w = w;
w.on('change',   e => log(`change · ${JSON.stringify(e).slice(0, 80)}`));
w.on('generate', e => log(`generate · ${JSON.stringify(e).slice(0, 80)}`));
</script>
</body></html>
