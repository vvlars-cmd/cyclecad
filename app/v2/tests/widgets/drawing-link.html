<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" /><title>drawing-link · demo</title>
<link rel="stylesheet" href="../../shared/theme.css">
<style>
  body { margin: 0; height: 100vh; display: grid; grid-template-rows: auto 1fr; font: 13px Inter, sans-serif; }
  header.bar { background: #1B2228; color: #fff; padding: 10px 16px; display: flex; gap: 12px; align-items: center; }
  header.bar a { color: var(--pt-green); text-decoration: none; }
  #stage { position: relative; background: #fafafa; padding: 24px; overflow: auto; }
  #log { position: absolute; right: 16px; bottom: 16px; max-width: 320px; max-height: 200px; overflow: auto;
          background: rgba(0,0,0,0.78); color: #cce; padding: 10px 12px; border-radius: 4px;
          font: 11px Menlo, monospace; }
</style>
<script type="importmap">{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
}}</script>
</head><body>
<header class="bar"><strong>drawing-link</strong><span style="opacity:.6">demo</span><span style="flex:1"></span>
  <a href="drawing-link.spec.html">Run spec ↗</a> <a href="../index.html">All ↗</a></header>
<div id="stage"><div id="log"></div></div>
<script type="module">
const log = (...a) => { const el = document.getElementById('log'); el.innerHTML += a.join(' ') + '<br>'; el.scrollTop = el.scrollHeight; };
const stubMeter = { charge: async () => ({ ok: true, balance: 1000000 }) };
import { init as initWidget } from '../../widgets/drawing-link.js';
const stage = document.getElementById('stage');
const w = await initWidget({ mount: stage, app: 'cyclecad', meter: stubMeter });
window.__w = w;
w.on('link',   e => log(`link · ${JSON.stringify(e).slice(0, 80)}`));
w.on('sync',   e => log(`sync · ${JSON.stringify(e).slice(0, 80)}`));
w.on('change', e => log(`change · ${JSON.stringify(e).slice(0, 80)}`));
</script>
</body></html>
