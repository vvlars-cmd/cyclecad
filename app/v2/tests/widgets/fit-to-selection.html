<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8" /><title>fit-to-selection · demo</title>
<link rel="stylesheet" href="../../shared/theme.css">
<style>
  body { margin: 0; height: 100vh; display: grid; grid-template-rows: auto 1fr; font: 13px Inter, sans-serif; }
  header.bar { background: #1B2228; color: #fff; padding: 10px 16px; display: flex; gap: 12px; align-items: center; }
  header.bar a { color: var(--pt-green); text-decoration: none; }
  #stage { position: relative; background: #fafafa; }
  .controls { position: absolute; left: 16px; top: 16px; background: #fff; border: 1px solid #e5e7eb;
              border-radius: 6px; padding: 12px; z-index: 10; display: flex; flex-direction: column; gap: 6px; }
  .controls button, .controls input { font-size: 11px; padding: 4px 8px; min-width: 140px; }
</style>
<script type="importmap">{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
}}</script>
</head><body>
<header class="bar"><strong>fit-to-selection</strong><span style="opacity:.6">demo</span><span style="flex:1"></span>
  <a href="fit-to-selection.spec.html">Run spec ↗</a> <a href="../index.html">All ↗</a></header>
<div id="stage"><div class="controls"><button id="fit-all">Fit to all</button><button id="fit-cube">Fit to red cube</button><button id="reset">Reset camera</button></div></div>
<script type="module">
import * as THREE from 'three';
import { init as initViewport } from '../../widgets/viewport.js';
import { init as initFit } from '../../widgets/fit-to-selection.js';
import { init as initGrid } from '../../widgets/grid.js';
const stage = document.getElementById('stage');
const v = await initViewport({ mount: stage });
await initGrid({ scene: v.api.getScene() });
const cube = new THREE.Mesh(new THREE.BoxGeometry(3,3,3), new THREE.MeshStandardMaterial({ color: 0xff0000 }));
cube.position.set(20, 1.5, 0); v.api.attach(cube);
for (let i = 0; i < 4; i++) {
  const m = new THREE.Mesh(new THREE.SphereGeometry(2), new THREE.MeshStandardMaterial({ color: new THREE.Color().setHSL(i/4, 0.5, 0.5) }));
  m.position.set(Math.random()*30-15, 1.5, Math.random()*30-15); v.api.attach(m);
}
const f = await initFit({ camera: v.api.getCamera(), root: v.api.getRoot() });
window.__fit = f;
document.getElementById('fit-all').addEventListener('click', () => f.api.fit());
document.getElementById('fit-cube').addEventListener('click', () => f.api.fit(cube));
document.getElementById('reset').addEventListener('click', () => f.api.reset());
</script>
</body></html>
