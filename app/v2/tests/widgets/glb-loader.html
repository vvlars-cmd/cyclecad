<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" /><title>glb-loader · demo</title>
<link rel="stylesheet" href="../../shared/theme.css">
<style>
  body { margin: 0; height: 100vh; display: grid; grid-template-rows: auto 1fr; font: 13px Inter, sans-serif; }
  header.bar { background: #1B2228; color: #fff; padding: 10px 16px; display: flex; gap: 12px; align-items: center; }
  header.bar a { color: var(--pt-green); text-decoration: none; }
  #stage { position: relative; background: #fafafa; }
  .controls { position: absolute; left: 16px; top: 16px; background: #fff; border: 1px solid #e5e7eb;
              border-radius: 6px; padding: 12px; z-index: 10; display: flex; flex-direction: column; gap: 6px; max-width: 240px; }
  .controls button, .controls select { font-size: 11px; padding: 4px 8px; min-width: 140px; }
  #log { position: absolute; right: 16px; bottom: 16px; max-width: 280px; max-height: 160px; overflow: auto;
          background: rgba(0,0,0,0.78); color: #cce; padding: 10px 12px; border-radius: 4px;
          font: 11px Menlo, monospace; }
</style>
<script type="importmap">{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
}}</script>
</head><body>
<header class="bar"><strong>glb-loader</strong><span style="opacity:.6">demo</span><span style="flex:1"></span>
  <a href="glb-loader.spec.html">Run spec ↗</a> <a href="../index.html">All ↗</a></header>
<div id="stage"><div class="controls"><div style="font-size:11px;color:#666">Drop a .glb / .gltf file anywhere on the viewport</div><button id="clear">Unload all</button></div><div id="log"></div></div>
<script type="module">
const log = (...a) => { const el = document.getElementById('log'); el.innerHTML += a.join(' ') + '<br>'; el.scrollTop = el.scrollHeight; };
import * as THREE from 'three';
import { init as initViewport } from '../../widgets/viewport.js';
import { init as initGlb }     from '../../widgets/glb-loader.js';
import { init as initGrid }    from '../../widgets/grid.js';
const stage = document.getElementById('stage');
const v = await initViewport({ mount: stage });
await initGrid({ scene: v.api.getScene() });
const gl = await initGlb({ scene: v.api.getScene(), target: v.api.getRoot() });
window.__glb = gl;

stage.addEventListener('dragover', e => { e.preventDefault(); stage.style.background = '#fff8e0'; });
stage.addEventListener('dragleave', () => { stage.style.background = '#fafafa'; });
stage.addEventListener('drop', async e => {
  e.preventDefault(); stage.style.background = '#fafafa';
  const file = e.dataTransfer.files[0];
  if (!file) return;
  log(`loading ${file.name}…`);
  try { const root = await gl.api.loadFromFile(file); log(`loaded · ${root.children.length} top-level children`); v.api.fit(); }
  catch (err) { log(`error → ${err.message || err}`); }
});

gl.on('load', e => log(`load event · ${e.animations} animations`));
document.getElementById('clear').addEventListener('click', () => { gl.api.unloadAll(); log('cleared'); });
</script>
</body></html>
