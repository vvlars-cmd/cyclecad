<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8" /><title>lights · standalone demo</title>
<link rel="stylesheet" href="../../shared/theme.css">
<style>
  body { margin: 0; height: 100vh; display: grid; grid-template-rows: auto 1fr; font: 13px Inter, sans-serif; }
  header.bar { background: #1B2228; color: #fff; padding: 10px 16px; display: flex; gap: 12px; align-items: center; }
  header.bar a { color: var(--pt-green); text-decoration: none; }
  #stage { position: relative; background: #fafafa; }
  .controls { position: absolute; left: 16px; top: 16px; background: #fff; border: 1px solid #e5e7eb;
              border-radius: 6px; padding: 12px; z-index: 10; display: flex; flex-direction: column; gap: 6px; }
  .controls button { font-size: 11px; padding: 4px 8px; min-width: 140px; }
</style>
<script type="importmap">{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
}}</script>
</head><body>
<header class="bar"><strong>lights</strong><span style="opacity:.6">demo</span><span style="flex:1"></span>
  <a href="lights.spec.html">Run spec ↗</a> <a href="../index.html">All ↗</a></header>
<div id="stage">
  <div class="controls">
    <button data-mode="studio">Studio</button>
    <button data-mode="sun">Sun</button>
    <button data-mode="sketch">Sketch</button>
  </div>
</div>
<script type="module">
import * as THREE from 'three';
import { init as initViewport } from '../../widgets/viewport.js';
import { init as initLights } from '../../widgets/lights.js';
import { init as initGrid } from '../../widgets/grid.js';
import { init as initAxes } from '../../widgets/axes.js';
const stage = document.getElementById('stage');
const v = await initViewport({ mount: stage });
await initGrid({ scene: v.api.getScene() });
await initAxes({ scene: v.api.getScene() });

// add a sample mesh so lighting changes are visible
const m = new THREE.Mesh(new THREE.IcosahedronGeometry(4, 1), new THREE.MeshStandardMaterial({ color: 0xd4a843, roughness: 0.4 }));
m.position.y = 4; v.api.attach(m);

const l = await initLights({ scene: v.api.getScene(), mode: 'studio' });
window.__lights = l;
document.querySelectorAll('button[data-mode]').forEach(b => {
  b.addEventListener('click', () => l.api.setMode(b.dataset.mode));
});
</script>
</body></html>
