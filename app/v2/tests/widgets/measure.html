<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" /><title>measure · demo</title>
<link rel="stylesheet" href="../../shared/theme.css">
<style>
  body { margin: 0; height: 100vh; display: grid; grid-template-rows: auto 1fr; font: 13px Inter, sans-serif; }
  header.bar { background: #1B2228; color: #fff; padding: 10px 16px; display: flex; gap: 12px; align-items: center; }
  header.bar a { color: var(--pt-green); text-decoration: none; }
  #stage { position: relative; background: #fafafa; }
  .controls { position: absolute; left: 16px; top: 16px; background: #fff; border: 1px solid #e5e7eb;
              border-radius: 6px; padding: 12px; z-index: 10; display: flex; flex-direction: column; gap: 6px; max-width: 240px; }
  .controls button, .controls select { font-size: 11px; padding: 4px 8px; min-width: 140px; }
  #log { position: absolute; right: 16px; bottom: 16px; max-width: 280px; max-height: 160px; overflow: auto;
          background: rgba(0,0,0,0.78); color: #cce; padding: 10px 12px; border-radius: 4px;
          font: 11px Menlo, monospace; }
</style>
<script type="importmap">{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
}}</script>
</head><body>
<header class="bar"><strong>measure</strong><span style="opacity:.6">demo</span><span style="flex:1"></span>
  <a href="measure.spec.html">Run spec ↗</a> <a href="../index.html">All ↗</a></header>
<div id="stage"><div class="controls"><button id="enable">Enable measure</button><button id="reset">Reset</button><div style="font-size:11px;color:#666;margin-top:6px">Click two points to measure distance</div></div><div id="log"></div></div>
<script type="module">
const log = (...a) => { const el = document.getElementById('log'); el.innerHTML += a.join(' ') + '<br>'; el.scrollTop = el.scrollHeight; };
import * as THREE from 'three';
import { init as initViewport } from '../../widgets/viewport.js';
import { init as initMeasure }  from '../../widgets/measure.js';
import { init as initGrid }     from '../../widgets/grid.js';
import { init as initAxes }     from '../../widgets/axes.js';
const stage = document.getElementById('stage');
const v = await initViewport({ mount: stage });
await initGrid({ scene: v.api.getScene() });
await initAxes({ scene: v.api.getScene() });
for (let i = 0; i < 4; i++) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(3,3,3), new THREE.MeshStandardMaterial({ color: new THREE.Color().setHSL(i/4,.6,.5) }));
  m.position.set((i-1.5)*8, 1.5, 0); v.api.attach(m);
}
const me = await initMeasure({ mount: stage, scene: v.api.getScene(), camera: v.api.getCamera(), target: v.api.getRoot() });
window.__measure = me;
me.on('measure', e => log(`distance → <b>${e.distance.toFixed(3)}</b> units`));
document.getElementById('enable').addEventListener('click', () => { me.api.toggle(); log(`active: ${me.api.isActive()}`); });
document.getElementById('reset').addEventListener('click', () => me.api.reset());
</script>
</body></html>
