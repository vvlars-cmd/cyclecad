<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8" /><title>picking · standalone demo</title>
<link rel="stylesheet" href="../../shared/theme.css">
<style>
  body { margin: 0; height: 100vh; display: grid; grid-template-rows: auto 1fr; font: 13px Inter, sans-serif; }
  header.bar { background: #1B2228; color: #fff; padding: 10px 16px; display: flex; gap: 12px; align-items: center; }
  header.bar a { color: var(--pt-green); text-decoration: none; }
  #stage { position: relative; background: #fafafa; }
  #log { position: absolute; right: 16px; bottom: 16px; max-width: 320px; max-height: 200px; overflow: auto;
         background: rgba(0,0,0,0.78); color: #cce; padding: 10px 12px; border-radius: 4px;
         font: 11px Menlo, monospace; }
  .info { position: absolute; left: 16px; top: 16px; background: #fff; border: 1px solid #e5e7eb;
          border-radius: 6px; padding: 12px; z-index: 10; font-size: 11px; max-width: 240px; }
</style>
<script type="importmap">{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
}}</script>
</head><body>
<header class="bar"><strong>picking</strong><span style="opacity:.6">demo</span><span style="flex:1"></span>
  <a href="picking.spec.html">Run spec ↗</a> <a href="../index.html">All ↗</a></header>
<div id="stage">
  <div class="info">Click any cube to pick it. Picked object is logged below + highlighted.</div>
  <div id="log"></div>
</div>
<script type="module">
import * as THREE from 'three';
import { init as initViewport } from '../../widgets/viewport.js';
import { init as initPicking }  from '../../widgets/picking.js';
import { init as initGrid }     from '../../widgets/grid.js';
import { init as initAxes }     from '../../widgets/axes.js';

const log = (...a) => {
  const el = document.getElementById('log');
  el.innerHTML += a.join(' ') + '<br>'; el.scrollTop = el.scrollHeight;
};

const stage = document.getElementById('stage');
const v = await initViewport({ mount: stage });
await initGrid({ scene: v.api.getScene() });
await initAxes({ scene: v.api.getScene() });

// add 8 random cubes
const meshes = [];
for (let i = 0; i < 8; i++) {
  const m = new THREE.Mesh(
    new THREE.BoxGeometry(3, 3, 3),
    new THREE.MeshStandardMaterial({ color: new THREE.Color().setHSL(i/8, 0.6, 0.5) })
  );
  m.name = `cube-${i}`;
  m.position.set(Math.random()*30-15, 1.5, Math.random()*30-15);
  v.api.attach(m); meshes.push(m);
}

const p = await initPicking({
  mount: stage,
  scene: v.api.getScene(),
  camera: v.api.getCamera(),
  target: v.api.getRoot(),
});
window.__picking = p;

p.on('pick', e => {
  log(`pick → <b>${e.object.name}</b> at (${e.point.x.toFixed(1)}, ${e.point.y.toFixed(1)}, ${e.point.z.toFixed(1)})`);
  meshes.forEach(m => m.material.emissive.setHex(m === e.object ? 0x444444 : 0));
});

log('picking ready · click a cube');
</script>
</body></html>
