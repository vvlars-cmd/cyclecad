<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" /><title>sketch-line · demo</title>
<link rel="stylesheet" href="../../shared/theme.css">
<style>
  body { margin: 0; height: 100vh; display: grid; grid-template-rows: auto 1fr; font: 13px Inter, sans-serif; }
  header.bar { background: #1B2228; color: #fff; padding: 10px 16px; display: flex; gap: 12px; align-items: center; }
  header.bar a { color: var(--pt-green); text-decoration: none; }
  #stage { position: relative; background: #fafafa; padding: 0; overflow: auto; }
  .controls { position: absolute; left: 16px; top: 16px; background: #fff; border: 1px solid #e5e7eb;
              border-radius: 6px; padding: 12px; z-index: 10; display: flex; flex-direction: column; gap: 6px; max-width: 240px; }
  .controls button { font-size: 11px; padding: 4px 8px; min-width: 140px; cursor: pointer;
                       background: #f3f4f6; border: 1px solid #e5e7eb; border-radius: 4px; }
  .controls button:hover { background: #e5e7eb; }
  #log { position: absolute; right: 16px; bottom: 16px; max-width: 320px; max-height: 200px; overflow: auto;
          background: rgba(0,0,0,0.78); color: #cce; padding: 10px 12px; border-radius: 4px;
          font: 11px Menlo, monospace; }
</style>
<script type="importmap">{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
}}</script>
</head><body>
<header class="bar"><strong>sketch-line</strong><span style="opacity:.6">demo</span><span style="flex:1"></span>
  <a href="sketch-line.spec.html">Run spec ↗</a> <a href="../index.html">All ↗</a></header>
<div id="stage"><div class="controls"><button id="btn-add">Add line</button><button id="btn-clear">Clear</button></div><div id="log"></div></div>
<script type="module">
const log = (...a) => { const el = document.getElementById('log'); el.innerHTML += a.join(' ') + '<br>'; el.scrollTop = el.scrollHeight; };
import { init as initViewport } from '../../widgets/viewport.js';
import { init as initGrid }     from '../../widgets/grid.js';
import { init as initAxes }     from '../../widgets/axes.js';
import { init as initWidget }   from '../../widgets/sketch-line.js';
const stage = document.getElementById('stage');
const v = await initViewport({ mount: stage });
await initGrid({ scene: v.api.getScene() });
await initAxes({ scene: v.api.getScene() });
const w = await initWidget({ scene: v.api.getScene() });
window.__w = w;
document.getElementById('btn-add').addEventListener('click', () => { w.api.add(); log(`+ entity · count=${w.api.count()}`); });
document.getElementById('btn-clear').addEventListener('click', () => { w.api.clear(); log('cleared'); });

</script>
</body></html>
